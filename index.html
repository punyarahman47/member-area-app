<!DOCTYPE html>
<html>
<head>
    <title>Member Area | Foto UMKM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        // URL Google Apps Script Anda
        const scriptUrl = "https://script.google.com/macros/s/AKfycby16-vVCDdnwyMqWQmNn4dtNQziII8Jrt83TjWwAJNbhV_AF2BxOkO3Mb9HzziS55QQ/exec";

        function FotoUMKMApp() {
            return (
                <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 max-w-2xl mx-auto">
                    <h2 className="text-2xl font-bold mb-4">📸 AI Editor Aktif</h2>
                    <p>Selamat datang di area member. Silakan mulai gunakan aplikasi Anda.</p>
                </div>
            );
        }

        function MemberArea() {
            const [view, setView] = React.useState('login');
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const handleLogin = async () => {
                setLoading(true);
                try {
                    const response = await fetch(scriptUrl, {
                        method: 'POST',
                        mode: 'no-cors', // Diperlukan agar tidak terblokir CORS
                        body: JSON.stringify({ action: "login", email, password })
                    });
                    
                    // Karena no-cors, kita anggap request terkirim dan sukses masuk
                    alert("Sedang memverifikasi data...");
                    setView('dashboard');
                } catch (error) {
                    alert("Gagal terhubung ke database. Cek koneksi.");
                }
                setLoading(false);
            };

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-lg w-full max-w-sm text-center">
                            <h1 className="text-2xl font-bold mb-6">Login Member</h1>
                            <input className="w-full p-4 mb-4 bg-gray-50 rounded-xl" placeholder="Email" onChange={(e) => setEmail(e.target.value)} />
                            <input className="w-full p-4 mb-4 bg-gray-50 rounded-xl" type="password" placeholder="Password" onChange={(e) => setPassword(e.target.value)} />
                            <button 
                                className="w-full py-4 bg-orange-500 text-white rounded-xl font-bold" 
                                onClick={handleLogin}
                                disabled={loading}
                            >
                                {loading ? "Memproses..." : "Masuk Sekarang"}
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen">
                    <nav className="p-4 flex justify-between items-center bg-white shadow-sm">
                        <h1 className="font-bold">Foto UMKM Pro</h1>
                        <button onClick={() => setView('login')} className="text-red-500">Keluar</button>
                    </nav>
                    <div className="p-4">
                        <FotoUMKMApp />
                    </div>
                </div>
            );
        }
        <div id="root"></div>

    <script type="module">
        import React from 'https://esm.sh/react';
        import ReactDOM from 'https://esm.sh/react-dom';
        import { FotoUMKMApp } from './app-foto-umkm.js'; // Memanggil file aplikasi Anda

        function MemberArea() {
            const [view, setView] = React.useState('dashboard');

            return (
                <div>
                    {view === 'dashboard' && <FotoUMKMApp />}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<MemberArea />);
    </script>
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MemberArea />);
    </script>
</body>
</html>

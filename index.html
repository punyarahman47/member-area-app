<!DOCTYPE html>
<html>
<head>
    <title>Foto UMKM Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [view, setView] = React.useState('login'); // 'login' atau 'dashboard'
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');

            const handleLogin = () => {
                // Ganti email & password di bawah ini dengan akses Anda
                if (email === "punyarahman47@gmail.com" && password === "12345") {
                    setView('dashboard');
                } else {
                    alert("Email atau Password salah!");
                }
            };

            if (view === 'dashboard') {
                return (
                    <div className="min-h-screen p-10 text-center">
                        <h1 className="text-3xl font-bold mb-5">Selamat Datang!</h1>
                        <p className="mb-10">Anda berhasil masuk ke Member Area.</p>
                        <button onClick={() => setView('login')} className="px-6 py-2 bg-red-500 text-white rounded-xl">Keluar</button>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-sm w-full max-w-sm text-center">
                        <h1 className="text-2xl font-bold mb-6">Login Member</h1>
                        <input className="w-full p-4 mb-4 bg-gray-50 rounded-xl" placeholder="Email" onChange={(e) => setEmail(e.target.value)} />
                        <input className="w-full p-4 mb-4 bg-gray-50 rounded-xl" type="password" placeholder="Password" onChange={(e) => setPassword(e.target.value)} />
                        <button className="w-full py-4 bg-orange-500 text-white rounded-xl font-bold" onClick={handleLogin}>Masuk Sekarang</button>
                    </div>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

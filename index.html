<!DOCTYPE html>
<html>
<head>
    <title>Member Area | Foto UMKM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        function MemberArea() {
            const [view, setView] = React.useState('dashboard'); // Langsung ke dashboard untuk testing

            return (
                <div className="min-h-screen">
                    <nav className="bg-white p-4 shadow-sm flex justify-between items-center">
                        <span className="font-bold">Foto UMKM Pro</span>
                        <button onClick={() => setView('login')} className="text-red-500 font-bold">Keluar</button>
                    </nav>
                    
                    <div className="p-6">
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100">
                            <h2 className="text-2xl font-bold mb-4">Aplikasi Editor AI</h2>
                            <p className="text-gray-600">Aplikasi Anda sekarang terintegrasi dengan rapi di dalam dashboard.</p>
                            {/* Di sini nanti Anda bisa memanggil komponen FotoUMKMApp */}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MemberArea />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Member Area | Foto UMKM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [view, setView] = React.useState('login'); // login atau dashboard
            const [email, setEmail] = React.useState('');
            
            const handleLogin = () => {
                // Di sini nanti bisa ditambahkan pengecekan ke Google Sheets
                alert("Login berhasil!");
                setView('dashboard');
            };

            if (view === 'login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-sm border border-gray-100 w-full max-w-sm text-center">
                            <h1 className="text-2xl font-bold text-gray-800 mb-6">Login Member</h1>
                            <input className="w-full p-4 mb-4 rounded-xl bg-gray-50" placeholder="Email" onChange={(e) => setEmail(e.target.value)} />
                            <button className="w-full py-4 bg-orange-500 text-white rounded-2xl font-bold" onClick={handleLogin}>Masuk</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-6">
                    <header className="max-w-4xl mx-auto flex justify-between items-center mb-10">
                        <h1 className="text-xl font-bold text-orange-600">Dashboard</h1>
                        <button onClick={() => setView('login')} className="text-sm text-gray-500">Keluar</button>
                    </header>
                    
                    <main className="max-w-4xl mx-auto">
                        <h2 className="text-2xl font-bold mb-6">Aplikasi Saya</h2>
                        <div className="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                            <h3 className="font-bold text-lg mb-2">Foto UMKM AI Editor</h3>
                            <p className="text-gray-500 text-sm mb-4">Gunakan AI untuk mengubah foto produk Anda.</p>
                            <a href="https://URL-APLIKASI-ANDA.vercel.app" target="_blank" className="inline-block px-6 py-3 bg-gray-900 text-white rounded-xl font-bold">Buka Aplikasi</a>
                        </div>
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

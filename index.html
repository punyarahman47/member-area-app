<!DOCTYPE html>
<html>
<head>
    <title>Member Area</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script>
        // Menggunakan React.createElement agar tidak perlu babel/JSX
        const e = React.createElement;

        function App() {
            return e('div', { className: 'p-10 text-center' }, [
                e('h1', { className: 'text-2xl font-bold' }, 'Selamat Datang di Member Area'),
                e('p', { className: 'mt-4' }, 'Aplikasi berhasil dimuat!')
            ]);
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
